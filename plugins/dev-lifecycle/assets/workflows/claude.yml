# Firm implement workflow — responds to @claude on issues and PRs.
#
# Copy this into a project's .github/workflows/ and replace <owner> with the
# marketplace repo owner (the account/org that hosts firm-plugins).
#
# Auth: OAuth only. The firm authenticates the model with a Claude
# subscription token (CLAUDE_CODE_OAUTH_TOKEN), never an Anthropic API key.
# The scaffolding/onboarding skills set this secret per repo
# (`gh secret set CLAUDE_CODE_OAUTH_TOKEN`) when wiring the pipeline.
#
# GitHub identity: assumes the Claude GitHub App is installed on the repo
# (the action uses the App's default token). If a repo needs an explicit app
# token, uncomment the create-github-app-token step below and pass its output
# as `github_token`.
#
# Plugin: a locally-installed plugin does NOT reach this runner — it is loaded
# explicitly via plugin_marketplaces + plugins below. If that marketplace repo
# is PRIVATE, the default GITHUB_TOKEN cannot fetch it — either make it public,
# or provide a read-scoped token and configure git to use it before this step.

name: Claude

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Only needed if you are NOT relying on the installed Claude GitHub App's
      # default identity. Provide app id + private key as secrets, then pass
      # `github_token: ${{ steps.app-token.outputs.token }}` to the action.
      # - name: Generate a GitHub App token
      #   id: app-token
      #   uses: actions/create-github-app-token@v1
      #   with:
      #     app-id: ${{ secrets.CLAUDE_APP_ID }}
      #     private-key: ${{ secrets.CLAUDE_APP_PRIVATE_KEY }}

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # github_token: ${{ steps.app-token.outputs.token }}
          # plugin_marketplaces takes full git URLs, not owner/repo shorthand.
          plugin_marketplaces: |
            https://github.com/<owner>/firm-plugins.git
          plugins: |
            dev-lifecycle@firm-plugins
          # The plugin is loaded above — this standing instruction tells the
          # agent to actually USE the firm's skills, not just have them present.
          claude_args: |
            --append-system-prompt "This repository is built by the development firm. The dev-lifecycle plugin (dev-lifecycle@firm-plugins) is loaded and its skills are available to you — USE them for all work: planning, backend, frontend, testing, code-review, devops, documentation, and the rest. They encode the firm's conventions and definition-of-done. Prefer the matching skill over ad-hoc work."
