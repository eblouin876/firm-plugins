name: freshness-audit

# Periodic review to keep the whole starter kit fresh — references, template
# blocks, recipes, the compatibility matrix, and doc-fragment drift. Two
# jobs, split by least privilege (see pending-workflows/README.md for why):
#
#   audit            — UNCHANGED from the original. Reads the metadata
#                       header on each reference (versions-covered,
#                       last-verified) and checks it against each library's
#                       current stable release and current best practices.
#                       Flags stale references in a tracking ISSUE.
#                       contents: read, issues: write.
#
#   extended-audit    — NEW (Stage 12, #35). Covers four more dimensions —
#                       template version-drift/rebuild-verify, recipe
#                       version-drift, compatibility-matrix drift, and doc
#                       drift (fragment-vs-README-vs-code) — and opens a
#                       review PR proposing fixes. contents: write,
#                       pull-requests: write. `scripts/validate_plugin.py`
#                       must pass before the PR is opened; it stays the hard
#                       gate, this job does not bypass it.
#
# Neither job self-applies a fix beyond opening its output for review: audit
# opens an issue, extended-audit opens a PR a human merges. Regenerated
# headers use `provenance: ... (pending review)` — never silently promoted
# to `provenance: manual`.

on:
  schedule:
    - cron: "0 14 * * 1"   # Mondays, 14:00 UTC
  workflow_dispatch: {}

permissions:
  contents: read
  issues: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Freshness audit
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: |
            https://github.com/eblouin-development/eblouin-plugins.git
          plugins: |
            dev-lifecycle@eblouin-plugins
          claude_args: "--model claude-sonnet-5"
          prompt: |
            Run a freshness audit of the reference library in
            plugins/dev-lifecycle/references/.

            Use the freshness-audit skill. For each reference file, read its
            metadata header (library, versions-covered, last-verified). For
            each library, check its current stable major version and whether
            its official docs show idiom or best-practice changes not yet
            reflected here. Ground every check in current official docs — do
            not rely on recall.

            A reference is STALE if a newer major shipped that it doesn't
            cover, if a documented idiom has changed, or if last-verified is
            more than 90 days ago and the library has since released.

            Open (or update) a single tracking issue titled
            "Reference freshness: <date>" listing each stale reference, the
            reason, and the current version. Do NOT edit references in this
            job — regeneration is done later as a reviewed PR. If nothing is
            stale, comment on the existing tracking issue that all references
            are current and do not open a new one.

  extended-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # create the freshness-audit/<date> branch + commits
      pull-requests: write   # open the review PR
    steps:
      - uses: actions/checkout@v4

      - name: Extended freshness audit (templates, recipes, matrix, docs)
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: |
            https://github.com/eblouin-development/eblouin-plugins.git
          plugins: |
            dev-lifecycle@eblouin-plugins
          claude_args: "--model claude-sonnet-5 --allowedTools Bash,Read,Write,Edit,Glob,Grep,WebFetch,WebSearch"
          prompt: |
            Run the EXTENDED freshness audit for the dev-lifecycle starter
            kit — the sibling of the reference-freshness job in this same
            workflow, covering everything that job does not: template
            blocks, recipes, the compatibility matrix, and doc drift.
            This prompt is self-contained; there is no freshness-audit
            skill to invoke for this job (only the sibling `audit` job's
            references-only prompt references one, and even that skill does
            not exist yet — do not look for it).

            Ground every version/idiom check in current official sources
            (registries, release notes, changelogs) — never recall. Today's
            date for branch/PR naming is whatever `date -u +%F` reports in
            this runner.

            ## Dimension 1 — Template version-drift / rebuild-verify
            For each `plugins/dev-lifecycle/templates/<layer>/<name>/README.md`
            (skip `_`-prefixed schema exemplars and any `docs/fragment.md`,
            same exemptions `scripts/validate_plugin.py` applies):
            1. Read its `last-verified` and `versions-pinned-to` header
               fields.
            2. Cross-check every dependency it pins (directly, or via
               `versions-pinned-to: references/compatibility-matrix.md`)
               against `plugins/dev-lifecycle/references/compatibility-matrix.md`
               and each dependency's current stable release from its
               official source (PyPI/npm/registry/release notes — never
               recall).
            3. Flag drift: the block's pin disagrees with the matrix, or
               either is behind the dependency's current stable, or
               `last-verified` is stale relative to an intervening release.
            4. REBUILD-VERIFY: for each flagged (or newly-touched) block,
               materialize a scratch check — copy
               `plugins/dev-lifecycle/templates/monorepo/` skeleton into a
               scratch directory (e.g. under `/tmp`), copy the block itself
               into the matching `apps/<name>/` or `packages/<name>/` slot
               the way scaffolding would, then run that scratch project's
               `just docs-check` and `just build` (or the block's own
               documented build/check command if the block predates a
               `just` target). A rebuild-verify failure is itself a
               freshness finding — note it in the PR even if the version
               pins looked fine.

            ## Dimension 2 — Recipe version-drift
            For each `plugins/dev-lifecycle/references/recipes/*.md` (skip
            `_RECIPE-TEMPLATE.md`): read its `last-verified` and the
            component/matrix versions it wires (its `applies-to` block and
            any version mentioned in its wire-up steps). Cross-check the
            same way as Dimension 1. Flag a recipe whose wire-up steps cite
            a component version, matrix row, or SDK version that the matrix
            or the component's own README has since superseded.

            ## Dimension 3 — Compatibility-matrix drift
            For each row in `plugins/dev-lifecycle/references/compatibility-matrix.md`,
            re-verify the pinned line against the dependency's current
            stable from its official source. Flag a row where a newer
            stable exists and was not deliberately held back (the matrix
            already documents its own deliberate holds inline — e.g. "held
            back one release", pre-GA exclusions, `minimumReleaseAge`
            judgment calls — respect those, do not flag a documented,
            reasoned hold as drift). Also flag a row whose `last-verified`
            predates an intervening release even if the pinned line still
            happens to be current, so the header itself doesn't go stale.

            ## Dimension 4 — Doc drift
            Two layers, one deterministic and one comprehension-based:
            - **Deterministic (README-vs-fragment):** materialize a scratch
              monorepo the same way as the Dimension 1 rebuild-verify (skeleton
              + at least one composed block with a `docs/fragment.md`), run
              `just docs-generate` once to produce a clean baseline root
              README, then run `node scripts/docs-aggregate.mjs --check`
              (script lives at `templates/monorepo/scripts/docs-aggregate.mjs`
              relative to the plugin root, materializes to
              `scripts/docs-aggregate.mjs` in a scaffolded project). A
              non-zero exit means the aggregated README and the fragments it
              should equal have drifted — this is how a hand-edited
              aggregated marker region is caught, deterministically, with no
              LLM judgment involved.
            - **Comprehension (fragment-vs-code):** for each template
              block's `docs/fragment.md` and its authoring-time
              `templates/<layer>/<name>/README.md`, compare what they claim
              (env vars, ports, commands, routes) against the block's actual
              code. Flag anything a fragment/README states that the code no
              longer does (or vice versa) — env vars renamed/removed, ports
              changed, commands no longer valid, routes added/removed
              without updating `exposes`.

            ## Gate — hard requirement before opening anything
            Run `python scripts/validate_plugin.py` from the repo root.
            It MUST pass (0 errors; warnings are fine and expected — e.g. it
            does not header-lint anything under `pending-workflows/`) before
            you open a PR. If it fails because of a change you made,
            fix your change, not the validator.

            ## Opening the review PR
            If Dimensions 1-4 together found ANYTHING to flag (a drifted
            pin, a failed rebuild-verify, a superseded recipe reference, a
            stale matrix row, or doc drift of either kind):
            1. Create branch `freshness-audit/<YYYY-MM-DD>` (today's date,
               UTC).
            2. Apply PROPOSED fixes only — never silently promoted to
               canon:
               - A regenerated/bumped header (block README, recipe, or
                 matrix row) gets `provenance: auto-generated (pending
                 review)` (or, if the file already used a differently-worded
                 pending marker, keep that convention) — never
                 `provenance: manual` for a change this job made.
               - Do not "fix" a rebuild-verify failure's root cause
                 yourself if it isn't a simple version-pin bump; flag it in
                 the PR body for a human instead of guessing at a code
                 change.
               - Deterministic doc-drift found via `docs-aggregate.mjs
                 --check` in a SCRATCH directory is a finding to report, not
                 something to fix inside this repo (the scratch project
                 isn't part of this repo) — unless the drift traces back to
                 a real, out-of-sync `docs/fragment.md` or block README
                 inside `plugins/dev-lifecycle/templates/`, in which case
                 propose the fix there.
            3. Re-run `python scripts/validate_plugin.py` after your edits
               and confirm it still passes.
            4. Open ONE pull request from that branch. Title:
               "Freshness audit: <date>". In the body, list findings grouped
               by dimension (1-4), what was proposed and what merely needs a
               human decision (e.g. an ambiguous rebuild-verify failure or a
               deliberate-hold judgment call the audit isn't confident
               overriding), and add a line `cc @eblouin876` (repo convention
               — the owner is tagged on every PR).

            If NOTHING was flagged across all four dimensions, do not create
            a branch or open a PR — finish without changes. Never touch
            `.github/workflows/**` — this job's own environment cannot push
            changes there (no `workflows` permission); if a workflow-file
            change seems warranted, note it in the PR body instead (or, if
            no PR is otherwise warranted, skip it — this job does not open a
            PR solely to report a workflow-file suggestion).
