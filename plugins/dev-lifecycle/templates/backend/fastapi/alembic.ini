[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os

# `sqlalchemy.url` is deliberately left unset here — alembic/env.py
# overrides it at runtime from this project's own Settings
# (app.core.config.get_settings().database_url), so DATABASE_URL is the
# single source of truth for both the running app and Alembic, in both
# online (`alembic upgrade head`) and offline (`alembic upgrade head --sql`)
# mode. See alembic/env.py's get_url().

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
