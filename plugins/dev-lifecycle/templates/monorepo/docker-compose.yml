# Root full-stack dev compose for a scaffolded monorepo: the backend API (built
# from whichever backend block materialized into `apps/api/`, reusing THAT
# block's own `Dockerfile`) plus a real Postgres, in one top-level file. This
# is the whole-project counterpart to the per-block `apps/api/docker-compose.yml`
# the `just dev` recipe boots — use it (`docker compose up --build`) when you
# want the frontend and API side by side under one compose project.
#
# NOT a production manifest (throwaway DB password, no secrets management, no
# replicas) — the infra block (templates/infra/aws-fargate/) owns real
# deployment. Postgres pin per references/compatibility-matrix.md "Containers"
# (postgres:18-bookworm). Frontend services are commented until a frontend
# block is scaffolded into `apps/web/` — absent-safe: an unbuilt service left
# commented can't redden `docker compose config` or a `docker compose up`.

services:
  db:
    image: postgres:18-bookworm
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - monorepo-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d app"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      # Dev stage (live-reload). The Dockerfile's default (last) stage is the
      # hardened `prod` image that ships and that the security-gate containers
      # job scans.
      target: dev
    environment:
      # Dev-only credentials matching `db` above — never a real environment.
      # FastAPI/asyncpg scheme shown; a Django `apps/api` uses
      # `postgresql://app:app@db:5432/app` instead (no +asyncpg suffix). Real
      # environments inject DATABASE_URL from Secrets Manager (the infra block).
      DATABASE_URL: postgresql+asyncpg://app:app@db:5432/app
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  # --- Frontend (uncomment once a frontend block is scaffolded to apps/web/) --
  # A project scaffolds exactly ONE frontend block into apps/web/ (they're
  # mutually exclusive) — uncomment the variant matching whichever one you
  # picked, not both. Both build from the SAME apps/web/Dockerfile path; only
  # the port and the public API-base-URL env var name differ, per that
  # block's own next.config.ts/vite.config.ts dev cross-origin cookie fix.
  #
  # Vite SPA (templates/frontend/vite-spa/) — port 5173, VITE_API_BASE_URL:
  # web:
  #   build:
  #     context: ./apps/web
  #     dockerfile: Dockerfile
  #     target: dev
  #   environment:
  #     VITE_API_BASE_URL: http://localhost:8000
  #   ports:
  #     - "5173:5173"
  #   depends_on:
  #     - api
  #
  # Next.js App Router (templates/frontend/nextjs/) — port 3000,
  # NEXT_PUBLIC_API_BASE_URL. Next's Dockerfile has no separate `dev` stage
  # (see that file); its dev loop runs via `just dev` (`next dev`) on the
  # host instead, so this compose service targets the same build the
  # Dockerfile ships in production — drop `target: dev` for this variant:
  # web:
  #   build:
  #     context: ./apps/web
  #     dockerfile: Dockerfile
  #   environment:
  #     NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - api

  # --- Admin tool (uncomment once templates/frontend/nextjs-admin/ is scaffolded to
  # apps/admin/) --------------------------------------------------------------
  # A SECOND, standalone Next.js app — NOT mutually exclusive with the `web`
  # variant above (a project can run both: the public app and the internal,
  # whole-app-admin-gated tool are two different deployables for two
  # different audiences). Same shape as the Next.js `web` service above
  # (same Dockerfile pattern, no separate `dev` stage, dev loop runs via
  # `just dev` on the host), except port 3001 (not 3000 — avoids a local
  # collision when both apps run side by side) and this app's own
  # NEXT_PUBLIC_API_BASE_URL:
  # admin:
  #   build:
  #     context: ./apps/admin
  #     dockerfile: Dockerfile
  #   environment:
  #     NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
  #   ports:
  #     - "3001:3001"
  #   depends_on:
  #     - api

volumes:
  monorepo-db-data:
