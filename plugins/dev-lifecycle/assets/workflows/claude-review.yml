# Firm review workflow — thin caller stub. Runs the firm's code-review skill on
# every opened or updated PR by calling the REUSABLE workflow in eblouin-plugins,
# so the review prompt (including the @claude / @owner routing rules) lives in
# ONE place instead of being duplicated per repo. Improve it once there; every
# project on the same major tag (@v1) picks it up on the next eblouin-plugins
# release — no re-sync of this file.
#
# Copy this into a project's .github/workflows/ and replace <owner> (appears
# twice: the reusable-workflow path and the `owner` input) with the handle that
# owns eblouin-plugins. The `owner` input is also who the review pings (`@<owner>`)
# when a PR is clean or a decision is needed. See claude.yml for the shared
# one-time setup (OAuth secret, GitHub App, Actions-created PRs, and the
# private-repo Actions "Access" toggle) and for how to pin a different ref.

name: Claude Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    # contents:read is deliberate — the review diagnoses and ROUTES by mention;
    # it never pushes fixes itself (the implement workflow does, when the review
    # tags @claude). Permissions are granted here and flow to the reusable
    # workflow.
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    uses: <owner>/eblouin-plugins/.github/workflows/claude-review.reusable.yml@v1
    secrets: inherit
    with:
      owner: <owner>
