# Firm implement workflow — responds to @claude on issues and PRs.
#
# Copy this into a project's .github/workflows/ and replace <owner> with the
# marketplace repo owner (the account/org that hosts firm-plugins).
#
# Auth: OAuth only. The firm authenticates the model with a Claude
# subscription token (CLAUDE_CODE_OAUTH_TOKEN), never an Anthropic API key.
# The scaffolding/onboarding skills set this secret per repo
# (`gh secret set CLAUDE_CODE_OAUTH_TOKEN`) when wiring the pipeline.
#
# GitHub identity: assumes the Claude GitHub App is installed on the repo
# (the action uses the App's default token). If a repo needs an explicit app
# token, uncomment the create-github-app-token step below and pass its output
# as `github_token`.
#
# Plugin: a locally-installed plugin does NOT reach this runner — it is loaded
# explicitly via plugin_marketplaces + plugins below. If that marketplace repo
# is PRIVATE, the default GITHUB_TOKEN cannot fetch it — either make it public,
# or provide a read-scoped token and configure git to use it before this step.
#
# PULL REQUESTS: claude-code-action does NOT open a PR on its own in tag mode —
# by default it only pushes a branch and posts a "Create PR" compare link, which
# leaves the pipeline stalled (claude-review.yml triggers on `pull_request`, so
# no PR means no review). We instruct the agent to open the PR itself with
# `gh pr create` (see the system prompt), tagging the repo owner (`@<owner>`) in
# the PR body so they are notified. For that to work the repo must allow
# it: Settings -> Actions -> General -> Workflow permissions ->
# "Allow GitHub Actions to create and approve pull requests" must be ENABLED
# (the scaffolding/onboarding skills turn this on via
# `gh api -X PUT repos/<owner>/<repo>/actions/permissions/workflow
#   -F default_workflow_permissions=write -F can_approve_pull_request_reviews=true`).
#
# WORKFLOW FILES: the agent CANNOT write files under `.github/workflows/` — the
# Claude GitHub App token has no `workflows` permission AND the action injects a
# hard prompt-level restriction against it (it is a not-yet-shipped feature
# upstream). A task whose deliverable is a workflow file cannot be finished
# hands-off: the agent commits the file to a clearly-labeled staging path and
# flags in the PR that a human must move it into `.github/workflows/`. The system
# prompt tells the agent to surface this honestly rather than silently relocate
# the file and mark the step done.
#
# TOOL PERMISSIONS: headless runs approve nothing interactively, so any Bash
# command the build/verify skills need (tests, linters, shellcheck, git, gh)
# must be pre-approved via `--allowedTools` in claude_args below, or it is
# rejected as "requires approval" and verification silently doesn't run. Bash is
# allowed broadly here; the action already gates triggering on write-access, so
# only repo collaborators can reach it.

name: Claude

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read   # lets Claude read CI results on PRs
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Only needed if you are NOT relying on the installed Claude GitHub App's
      # default identity. Provide app id + private key as secrets, then pass
      # `github_token: ${{ steps.app-token.outputs.token }}` to the action.
      # - name: Generate a GitHub App token
      #   id: app-token
      #   uses: actions/create-github-app-token@v1
      #   with:
      #     app-id: ${{ secrets.CLAUDE_APP_ID }}
      #     private-key: ${{ secrets.CLAUDE_APP_PRIVATE_KEY }}

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # github_token: ${{ steps.app-token.outputs.token }}
          # By default the action ignores events whose actor is a bot. In the
          # firm's autonomous pipeline the agent itself posts as a bot (e.g. an
          # @claude follow-up on an issue or PR it is already working), so those
          # events must be allowed through or the pipeline stalls. Allow the
          # Claude bot specifically; widen to other bots only if you need them.
          allowed_bots: "claude"
          # plugin_marketplaces takes full git URLs, not owner/repo shorthand.
          plugin_marketplaces: |
            https://github.com/<owner>/firm-plugins.git
          plugins: |
            dev-lifecycle@firm-plugins
          # The plugin is loaded above. This standing instruction tells the agent
          # to actually USE the firm's skills, not just have them present. Use
          # --system-prompt (the documented tag-mode customization knob shown in
          # the action's examples/claude.yml); the comment/PR context is injected
          # separately, so this does not suppress tag-mode behavior.
          #
          # --allowedTools pre-approves the tools the firm skills need in a
          # headless run (Bash for tests/linters/git/gh, the file-ops commit
          # tools the action uses to push). The system prompt adds: open the PR
          # yourself, report status truthfully, and handle the workflow-file
          # limitation honestly. See the header notes above for why each is here.
          claude_args: |
            --allowedTools "Bash,Edit,MultiEdit,Write,Read,Glob,Grep,TodoWrite,mcp__github_file_ops__commit_files,mcp__github_file_ops__delete_files"
            --system-prompt "This repository is built by the development firm. The dev-lifecycle plugin (dev-lifecycle@firm-plugins) is loaded and its skills are available. For the requested work, use the matching firm skill (planning, backend, frontend, testing, code-review, devops, documentation, and the rest) rather than working ad-hoc, and follow the firm conventions and definition-of-done. When the work is complete and your branch is pushed, OPEN A PULL REQUEST yourself against the repository default branch with `gh pr create` (give it a clear title and a body that summarizes the change and references the issue, and tag the repository owner by including `@<owner>` on its own line in the body — e.g. `cc @<owner>` — so they are notified and can pull the PR up quickly, including on mobile) — do not stop at the compare link; the action does not open the PR for you and the review pipeline only runs once a PR exists. Report status with complete honesty: mark a checklist item done ONLY if it actually completed, and never claim a PR was opened, tests or linters passed, or a file was written unless it truly happened. You CANNOT modify files under .github/workflows/ (the GitHub App lacks the workflows permission). If the task requires creating or changing a workflow file, do NOT silently relocate it and check the box — commit it to the branch under a clearly-labeled staging path (for example pending-workflows/) and state plainly in the PR description that a human must move each such file into .github/workflows/ before the pipeline is live, listing them. Whenever you create or change a GitHub Actions workflow file (including a staged one) run actionlint on it, and run shellcheck on any shell script you touch — install the linter if it is not already present — and fix every finding before opening the PR; these are CI gates, so an unlinted workflow or script fails review."
