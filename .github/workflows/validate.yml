name: validate

# Gate every change to the plugin. The Python validator is the authoritative,
# deterministic check (no auth, no network) — it catches invalid manifests and
# invalid SKILL.md frontmatter, which is what Claude Code rejects on install.
# The official `claude plugin validate` runs as a best-effort cross-check.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install pyyaml

      - name: Validate plugin (authoritative)
        run: python scripts/validate_plugin.py

      - name: claude plugin validate (best-effort cross-check)
        continue-on-error: true
        run: |
          npm install -g @anthropic-ai/claude-code
          claude plugin validate ./plugins/dev-lifecycle
